<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot History - {{ student_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: white;
      margin: 0;
      padding: 0;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background-color: #1f1f1f;
      padding: 16px 28px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h2 {
      color: #ffffff;
      font-size: 20px;
    }

    .navbar a {
      color: #ffffff;
      text-decoration: none;
      background-color: #1a73e8;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
    }

    .navbar a:hover {
      background-color: #1559c2;
    }

    .chat-container {
      max-width: 800px;
      margin: 100px auto 30px; /* Extra top margin to prevent overlap */
      background-color: #1f1f1f;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .chat-header {
      font-size: 18px;
      margin-bottom: 20px;
      color: #1a73e8;
      text-align: center;
    }

    .chat-message {
      max-width: 70%;
      padding: 12px 16px;
      margin-bottom: 15px;
      border-radius: 20px;
      word-wrap: break-word;
      font-size: 15px;
      line-height: 1.4;
      position: relative;
    }

    .user-message {
      background-color: #2e2e2e;
      margin-right: auto;
      text-align: left;
      border-top-left-radius: 0;
    }

    .bot-message {
      background-color: #1a73e8;
      margin-left: auto;
      text-align: left;
      border-top-right-radius: 0;
      color: white;
    }

    .timestamp {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .chat-message {
        max-width: 90%;
        font-size: 14px;
      }

      .navbar h2 {
        font-size: 18px;
      }

      .chat-header {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Navigation (Fixed) -->
  <header class="navbar">
    <h2>{{ student_name }}</h2>
    <a href="{{ url_for('chat_history_students') }}">← Back</a>
  </header>

  <!-- Chat Content -->
  <div class="chat-container">

    {% for chat in chats %}
      <div class="chat-message {% if chat.sender == 'bot' %}bot-message{% else %}user-message{% endif %}">
        {{ chat.message }}
        <div class="timestamp">{{ chat.timestamp }}</div>
      </div>
    {% else %}
      <p style="color: #ccc; text-align: center;">No chat history available for this student.</p>
    {% endfor %}
  </div>

</body>
</html>
