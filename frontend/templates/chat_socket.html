<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat with {{ student_id }}</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 0;
    }

    .chat-box {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    #messages {
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f8f9fa;
    }

    .msg {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 20px;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 15px;
      clear: both;
    }

    .admin {
      background-color: #d1e7dd;
      color: #155724;
      float: right;
      text-align: right;
    }

    .student {
      background-color: #e2e3e5;
      color: #383d41;
      float: left;
      text-align: left;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input#messageInput {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
    }

    button {
      padding: 12px 20px;
      background-color: #2e5ee3;
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #1d45b1;
    }
  </style>
</head>
<body>

  <div class="chat-box">
    <h2>Issue: {{ issue }}</h2>

    <div id="messages">
      {% for chat in chat_data %}
        <div class="msg {{ chat.message_from }}">
          <strong>{{ 'You' if (session.admin and chat.message_from == 'admin') or (session.student and chat.message_from == 'student') else 'Other' }}:</strong>
          {{ chat.message }}
        </div>
      {% endfor %}
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
<script>
  const socket = io();
  const student_id = "{{ student_id }}";
  const room = `room_${student_id}`;
  const role = "{{ role }}"; 

  // ✅ Correct room join
  socket.emit('join_room', { room });

  // ✅ Send message
  function sendMessage() {
    const message = document.getElementById("messageInput").value.trim();
    if (!message) return;

    socket.emit('send_message', {
      student_id: student_id,
      message: message,
      message_from: role
    });

    document.getElementById("messageInput").value = '';
  }

  // ✅ Receive message
  socket.on('receive_message', (data) => {
    if (data.student_id != student_id) return;

    const div = document.createElement('div');
    div.classList.add('msg', data.message_from);
    div.textContent = `${data.message_from === 'admin' ? 'Admin' : 'Student'}: ${data.message}`;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  });
</script>


</body>
</html>
