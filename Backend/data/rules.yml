version: "3.1"

rules:
- rule: Greet user with AI
  steps:
    - intent: greet
    - action: action_gemini_enhancer

- rule: Answer Campus Info using AI
  steps:
    - intent: ask_any_info
    - action: action_gemini_enhancer

- rule: Handle unknown or out-of-context questions with AI
  steps:
    - intent: nlu_fallback
    - action: action_gemini_enhancer

- rule: Say goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye